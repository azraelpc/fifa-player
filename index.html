<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AZify Player</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #121212; color: #e5e7eb; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; height: 100vh; height: 100dvh; width: 100vw; overflow:hidden; }
        main {
                scroll-behavior: smooth;
            }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #121212; }
        ::-webkit-scrollbar-thumb { background: #282828; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #3e3e3e; }
        /* Estilizado del slider de volumen */
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 12px;
            width: 12px;
            border-radius: 50%;
            background: #1db954;
            cursor: pointer;
        }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden select-none">

    <button id="btn-logout" onclick="cerrarSesion()" class="hidden fixed top-4 right-4 z-50 bg-neutral-900/80 hover:bg-[#1db954] text-gray-400 hover:text-black border border-neutral-800 hover:border-transparent font-mono text-xs font-bold px-3 py-2 rounded-lg backdrop-blur-sm cursor-pointer transition-all shadow-lg flex items-center gap-1.5">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75" />
        </svg>
        Logout
    </button>

    <div class="flex flex-1 overflow-hidden">
        <aside class="w-64 lg:w-[22rem] bg-black p-4 lg:p-6 flex flex-col gap-4 hidden md:flex flex-shrink-0 h-full overflow-hidden">
            <div class="text-xl font-black text-white flex items-center gap-2 tracking-tight flex-shrink-0 mb-2">
                <svg class="w-7 h-7 text-[#1db954]" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.586 14.424c-.18.295-.565.387-.86.207-2.377-1.454-5.37-1.783-8.893-.982-.336.075-.668-.135-.745-.47-.077-.337.135-.668.47-.745 3.856-.88 7.15-.502 9.822 1.133.296.182.387.567.206.857zm1.22-2.723c-.227.367-.707.487-1.074.26-2.72-1.672-6.87-2.157-10.08-1.182-.413.125-.847-.107-.972-.52-.125-.413.108-.847.52-.972 3.67-1.114 8.243-.573 11.35 1.34.367.226.487.707.256 1.074zm.105-2.834C14.383 8.807 8.545 8.614 5.14 9.648c-.522.158-1.076-.14-1.234-.662-.158-.522.14-1.076.662-1.234 3.916-1.19 10.364-.97 14.73 1.623.47.28.624.893.343 1.364-.28.47-.893.623-1.364.342z"/></svg>
                <span class="hidden lg:inline">AZify Player</span>
                <span class="lg:hidden">AZify</span>
            </div>            
            <div class="flex flex-col gap-4 text-gray-400 font-bold text-sm flex-shrink-0">
                <a href="javascript:void(0)" onclick="showHome()" class="hover:text-white flex items-center gap-3 text-white transition">Home</a>
                <button onclick="playAll()" class="hover:text-white flex items-center gap-3 transition text-left cursor-pointer w-full">Play All</button>
                <div class="border-t border-gray-800 my-1"></div>
                
                <!-- Sección Filtro de Texto -->
                <div class="flex items-center gap-2 text-xs font-mono">
                    <span class="text-gray-500 font-black tracking-wider uppercase shrink-0">Filter:</span>
                    <input type="text" id="search-filter" autofocus autocomplete="off" placeholder="..." 
                           class="flex-1 bg-neutral-900 text-white border border-neutral-800 focus:border-[#1db954] focus:outline-none rounded px-2 py-1 text-xs font-mono transition-colors"
                           oninput="handleFilterChange()" onkeydown="handleFilterNavigation(event)">
                </div>

                <p class="text-xs uppercase tracking-wider text-gray-500 font-black">Your Library</p>
            </div>
            <div class="flex-1 overflow-y-auto pr-1 flex flex-col gap-1 font-normal text-gray-400 pb-4 min-h-0" id="sidebar-album-list"></div>
        </aside>

        <main class="flex-1 overflow-y-auto p-4 md:p-8 pb-32 bg-gradient-to-b from-[#1f2937]/40 via-[#121212] to-[#121212]">
            <div id="main-view">
                <h2 class="text-2xl font-black text-white mb-6 tracking-tight">Albums</h2>
                <div id="albums-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 md:gap-6"></div>
            </div>

            <div id="album-view" class="hidden">
                <button onclick="hideAlbum()" class="mb-6 text-sm font-bold text-gray-400 hover:text-white flex items-center gap-2 cursor-pointer transition">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    Back
                </button>
                <div class="flex flex-col sm:flex-row gap-6 items-center sm:items-end mb-8 text-center sm:text-left">
                    <img id="view-cover" class="w-30 h-30 md:w-48 md:h-48 object-cover rounded shadow-2xl border border-white/5" src="" alt="">
                    <div class="flex-1">
                        <p class="text-xs font-bold uppercase text-gray-400">Album</p>
                        <h3 id="view-title" class="text-2xl md:text-5xl font-black text-white mt-2 tracking-tight flex flex-wrap items-center gap-4"></h3>
                        <p id="view-count" class="text-sm text-gray-400 mt-2 font-medium"></p>
                    </div>
                </div>
                
                <div class="bg-black/20 rounded-xl p-2 md:p-4 border border-white/5 backdrop-blur-md overflow-x-auto">
                    <table class="w-full text-left border-collapse table-fixed">
                        <thead>
                            <tr class="text-gray-400 text-xs border-b border-gray-800 uppercase tracking-wider">
                                <th class="pb-3 w-8 text-center">#</th>
                                <th class="pb-3 w-8 text-center">Play</th>
                                <th class="pb-3">Title</th>
                                <th class="pb-3 w-14 text-center">Dur</th>
                            </tr>
                        </thead>
                        <tbody id="tracks-list" class="text-sm text-gray-300 divide-y divide-gray-800/30"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <audio id="audio-player"></audio>

    <footer class="h-24 bg-[#181818] border-t border-gray-900 px-4 flex items-center justify-between z-50 gap-4 shrink-0 overflow-hidden">
        
        <div class="flex items-center gap-3 w-1/4 min-w-[150px]">
            <div class="w-12 h-12 bg-[#282828] rounded flex items-center justify-center border border-white/5 overflow-hidden flex-shrink-0">
                <img id="current-cover" class="w-full h-full object-cover hidden" src="" alt="">
                <svg id="placeholder-cover" class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"></path></svg>
            </div>
            <div class="overflow-hidden">
                <p id="current-title" class="text-sm text-white font-semibold truncate">No track selected</p>
                <p id="current-album" class="text-xs text-gray-400 truncate">-</p>
            </div>
        </div>

        <div class="flex flex-col items-center flex-1 max-w-xl gap-2">
            <div class="flex items-center gap-5">
                <button onclick="playPrevious()" class="text-gray-400 hover:text-white transition"><svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
                <button onclick="togglePlay()" id="master-play-btn" class="w-8 h-8 bg-white text-black rounded-full flex items-center justify-center hover:scale-105 transition">
                    <svg id="play-icon" class="w-4 h-4 fill-current ml-0.5" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="pause-icon" class="w-4 h-4 fill-current hidden" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <button onclick="playNext()" class="text-gray-400 hover:text-white transition"><svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
            </div>
            <div class="w-full flex items-center gap-2 text-xs text-gray-400 font-mono">
                <span id="time-current">0:00</span>
                <div class="flex-1 h-1 bg-[#404040] rounded-full relative cursor-pointer" id="progress-container" onclick="seekTrack(event)">
                    <div class="absolute top-0 left-0 h-full bg-[#1db954] rounded-full" id="progress-bar" style="width: 0%"></div>
                </div>
                <span id="time-total">0:00</span>
            </div>
        </div>

        <div class="w-1/4 flex justify-end items-center gap-2 overflow-hidden">
            <canvas id="vu-meter" class="w-20 h-8 hidden sm:block"></canvas>
            
            <div class="flex items-center gap-1 shrink-0">
                <svg class="w-4 h-4 text-gray-400 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M15.536 8.464a5 5 0 010 7.072M18.364 5.636a9 9 0 010 12.728M12 18.75V5.25L7.75 9.5H4.5v5h3.25L12 18.75z"></path>
                </svg>
                <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1" 
                       class="w-16 sm:w-20 h-1 bg-[#404040] rounded-full appearance-none cursor-pointer accent-[#1db954]" 
                       oninput="changeVolume(event)"
                       onwheel="scrollVolume(event)">
            </div>
        </div>

    </footer>


    <script>
        let musicData = [];
        let currentAlbumIdx = -1;
        let currentTrackIdx = -1;
        let lastAlbumIndex = -1;

        let isShuffleActive = false;
        let shuffleQueue = [];
        let shufflePointer = -1;

        // Variables añadidas para el filtrado y navegación por teclado
        let filteredIndices = [];
        let keyboardActiveIdx = -1;

        const audioPlayer = document.getElementById('audio-player');
        const progressBar = document.getElementById('progress-bar');
        const progressContainer = document.getElementById('progress-container');
        const timeCurrent = document.getElementById('time-current');
        const timeTotal = document.getElementById('time-total');
        
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');

        let audioContext, analyser, dataArray, canvas, ctx, source;
        
        // Variables para el scrolling del Title de la pestaña
        let titleScrollInterval = null;
        let currentScrollText = "";

        function showHome() {
            document.getElementById('album-view').classList.add('hidden');
            document.getElementById('main-view').classList.remove('hidden');
            const mainContainer = document.querySelector('main');
            mainContainer.scrollTop = 0;
        }

        function escapeHTML(str) {
            if (!str) return '';
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }

        async function init() {
            const grid = document.getElementById('albums-grid');
            grid.innerHTML = '<p class="text-gray-400 animate-pulse">Scanning music, please wait...</p>';

            // 1. Control del botón de Logout (Solo visible si hay token guardado)
            const token = localStorage.getItem('azpwd');
            if (token) {
                const logoutBtn = document.getElementById('btn-logout');
                if (logoutBtn) logoutBtn.classList.remove('hidden');
            }

            try {
                // 2. Petición limpia enviando cabecera custom de seguridad
                const pwd = token || '';
                const res = await fetch('/api/music', {
                    headers: { 'X-Azify-Pass': pwd }
                });

                if (res.status === 401) {
                    localStorage.removeItem('azpwd');
                    document.cookie = "azpwd=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
                    location.reload();
                    return;
                }

                // 3. Renderizado y asignación de datos
                musicData = await res.json();
                
                // Inicializar índices filtrados con toda la música
                filteredIndices = musicData.map((_, i) => i);

                renderAlbums();
                renderSidebar();

                // Foco por defecto en el filtro
                document.getElementById('search-filter').focus();

                const intervaloRefresco = setInterval(async () => {
                    const checkRes = await fetch('/api/music', { headers: { 'X-Azify-Pass': pwd } });
                    if (checkRes.status === 200) {
                        const newData = await checkRes.json();
                        
                        // Si detecta cualquier cambio en la estructura de la música...
                        if (JSON.stringify(newData) !== JSON.stringify(musicData)) {
                            musicData = newData;
                            
                            // Recalcula los índices respetando lo que tengas escrito en el buscador
                            const query = document.getElementById('search-filter').value.toLowerCase().trim();
                            filteredIndices = [];
                            musicData.forEach((item, index) => {
                                if (item.album.toLowerCase().includes(query)) {
                                    filteredIndices.push(index);
                                }
                            });
                            
                            // Redibuja la interfaz con el contenido nuevo
                            renderAlbums();
                            renderSidebar();
                            
                            // ¡Éxito! Como ya ha cargado los cambios en tu sesión, apagamos el bucle
                            clearInterval(intervaloRefresco);
                            console.log("Biblioteca sincronizada con éxito en segundo plano.");
                        }
                    }
                }, 5000); // Comprueba cada 5 segundos


            } catch (err) {
                console.error("Error cargando la música:", err);
                grid.innerHTML = '<p class="text-red-500">Error loading music library.</p>';
            }
        }

        // Lógica de filtrado de texto y navegación por teclado
        function handleFilterChange() {
            const query = document.getElementById('search-filter').value.toLowerCase().trim();
            
            filteredIndices = [];
            musicData.forEach((item, index) => {
                if (item.album.toLowerCase().includes(query)) {
                    filteredIndices.push(index);
                }
            });

            keyboardActiveIdx = -1; // Reset del foco de teclado al escribir
            renderAlbums();
            renderSidebar();
        }

        function handleFilterNavigation(event) {
            if (filteredIndices.length === 0) return;

            if (event.key === 'ArrowDown') {
                event.preventDefault(); // Evita mover el scroll horizontal o cursor del input
                keyboardActiveIdx++;
                if (keyboardActiveIdx >= filteredIndices.length) {
                    keyboardActiveIdx = 0;
                }
                updateSidebarActiveVisual();
            } 
            else if (event.key === 'ArrowUp') {
                event.preventDefault();
                keyboardActiveIdx--;
                if (keyboardActiveIdx < 0) {
                    keyboardActiveIdx = filteredIndices.length - 1;
                }
                updateSidebarActiveVisual();
            } 
            else if (event.key === 'Enter') {
                event.preventDefault();
                const pointer = keyboardActiveIdx === -1 ? 0 : keyboardActiveIdx;
                const absoluteIdx = filteredIndices[pointer];
                if (absoluteIdx !== undefined) {
                    playAlbumFromSidebar(absoluteIdx);
                }
            }
        }

        function updateSidebarActiveVisual() {
            const sidebarContainer = document.getElementById('sidebar-album-list');
            const items = sidebarContainer.querySelectorAll('[data-album-idx]');
            const selectedAbsoluteIdx = filteredIndices[keyboardActiveIdx];

            items.forEach(item => {
                const itemIdx = parseInt(item.getAttribute('data-album-idx'), 10);
                if (itemIdx === selectedAbsoluteIdx) {
                    item.classList.add('bg-neutral-800', 'text-white');
                    item.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
                } else {
                    item.classList.remove('bg-neutral-800', 'text-white');
                }
            });
        }

        function cerrarSesion() {
            localStorage.removeItem('azpwd');
            document.cookie = "azpwd=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
            location.reload();
        }

        function changeVolume(event) {
            const vol = event.target.value;
            audioPlayer.volume = vol;
            localStorage.setItem('player-volume', vol);
        }

        function scrollVolume(event) {
            // Evita que la página haga scroll vertical al usar la rueda sobre el slider
            event.preventDefault(); 

            const slider = event.currentTarget;
            // deltaY es negativo hacia arriba (subir volumen) y positivo hacia abajo (bajar volumen)
            const step = 0.05; // Cambia este valor si quieres que suba/baje más rápido o más lento
            
            let newVolume = parseFloat(slider.value) + (event.deltaY < 0 ? step : -step);
            
            // Forzamos a que el volumen se mantenga entre los límites correctos (0.0 y 1.0)
            newVolume = Math.max(0, Math.min(1, newVolume));
            
            // Actualizamos visualmente el slider
            slider.value = newVolume;
            
            // Aplicamos el volumen al reproductor y guardamos en el localStorage
            audioPlayer.volume = newVolume;
            localStorage.setItem('player-volume', newVolume);
        }


        function playAlbumFromSidebar(index) {
            isShuffleActive = false; // Desactiva el shuffle al saltar a una carpeta nueva
            showAlbum(index);
            setTimeout(() => {
                playAlbumFirstTrack(index);
            }, 50);
        }

        function renderAlbums() {
            const grid = document.getElementById('albums-grid');
            
            if (filteredIndices.length === 0) {
                grid.innerHTML = '<p class="text-gray-500 col-span-full">No matching albums found.</p>';
                return;
            }

            grid.innerHTML = filteredIndices.map(index => {
                const item = musicData[index];
                return `
                <div class="bg-[#181818] p-3 md:p-4 rounded-lg hover:bg-[#282828] transition cursor-pointer group shadow-lg border border-transparent hover:border-gray-800 relative" onclick="showAlbum(${index})">
                    <div class="relative w-full aspect-square mb-3 md:mb-4 overflow-hidden rounded-md shadow-md">
                        <img class="w-full h-full object-cover" src="${item.cover}" onerror="this.src='./nocover.jpg'">
                        
                        <div class="absolute bottom-2 right-2 flex items-center gap-2 opacity-0 group-hover:opacity-100 transition-all duration-200 translate-y-2 group-hover:translate-y-0 z-10">
                            <button onclick="event.stopPropagation(); playAlbumShuffle(${index});" 
                                    class="w-9 h-9 bg-gray-900/90 text-gray-300 hover:text-[#1db954] rounded-full flex items-center justify-center transition shadow-xl hover:scale-105 active:scale-95 cursor-pointer" title="Shuffle">
                                <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24"><path d="M14.83 13.41L13.42 14.83l3.43 3.43H14v2h6v-6h-2v2.83l-3.17-3.17M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.33 2.33-4.17 4.17 1.42 1.41 4.17-4.17L20.6 10H21V4h-6.5zm-5.33 9.42l-1.42-1.41L4 16.59V19h2.41l3.17-3.17z"/></svg>
                            </button>
                            <button onclick="event.stopPropagation(); isShuffleActive=false; playAlbumFirstTrack(${index});" 
                                    class="w-12 h-12 bg-[#1db954] rounded-full flex items-center justify-center text-black shadow-xl hover:scale-105 active:scale-95 cursor-pointer">
                                <svg class="w-6 h-6 fill-current ml-1" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                            </button>
                        </div>
                    </div>
                    <h4 class="text-white font-bold text-xs md:text-sm truncate">${escapeHTML(item.album)}</h4>
                    <p class="text-gray-400 text-[10px] md:text-xs mt-1">${item.tracks.length} tracks</p>
                </div>
                `;
            }).join('');
        }

        function updateTabTitle(trackTitle, isPlaying) {
            clearInterval(titleScrollInterval);
            if (!isPlaying) {
                document.title = "AZify Player";
                return;
            }
            
            currentScrollText = `[AZify] - ${trackTitle}       `;
            
            titleScrollInterval = setInterval(() => {
                currentScrollText = currentScrollText.substring(1) + currentScrollText.substring(0, 1);
                document.title = currentScrollText;
            }, 350);
        }

        function refreshTracksList(albumIdx) {
            const album = musicData[albumIdx];
            const list = document.getElementById('tracks-list');
            
            list.innerHTML = album.tracks.map((track, trackIdx) => {
                const isCurrent = (currentAlbumIdx === albumIdx && currentTrackIdx === trackIdx);
                const isPlaying = isCurrent && !audioPlayer.paused;
                
                const match = track.title.match(/^(.*)(\.[^.]+)$/);
                const baseName = match ? match[1] : track.title;
                const extension = match ? match[2] : '';

                return `
                <tr ondblclick="pressTrackRow(${albumIdx}, ${trackIdx})"
                    class="hover:bg-white/5 transition group ${isCurrent ? 'bg-white/5 text-[#1db954]' : ''}">
                    <td class="p-2 text-center text-gray-500 font-bold text-xs">${trackIdx + 1}</td>
                    <td class="p-1 text-center">
                        <button onclick="pressTrackRow(${albumIdx}, ${trackIdx})" class="text-gray-400 hover:text-[#1db954] transition cursor-pointer">
                            ${isPlaying ? 
                                `<svg class="w-4 h-4 fill-current text-[#1db954]" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>` : 
                                `<svg class="w-4 h-4 fill-current ${isCurrent ? 'text-[#1db954]' : ''}" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>`
                            }
                        </button>
                    </td>
                    <td class="p-2 font-medium ${isCurrent ? 'text-[#1db954]' : 'text-white'}" title="${escapeHTML(track.title)}">
                        <div class="flex w-full min-w-0">
                            <span class="truncate">${escapeHTML(baseName)}</span>
                            <span class="shrink-0 text-gray-400 font-semibold">${escapeHTML(extension)}</span>
                        </div>
                    </td>
                    <td class="p-2 text-center text-gray-400 font-mono text-xs">${escapeHTML(track.duration)}</td>
                </tr>
                `;
            }).join('');
        }

        function renderSidebar() {
            const list = document.getElementById('sidebar-album-list');
            
            if (filteredIndices.length === 0) {
                list.innerHTML = '<div class="text-xs text-gray-600 pl-2">No results</div>';
                return;
            }

            list.innerHTML = filteredIndices.map(index => {
                const item = musicData[index];
                const isCurrentAlbum = (currentAlbumIdx === index);
                const safeAlbum = escapeHTML(item.album);
                return `
                <div onclick="showAlbum(${index})" 
                     ondblclick="playAlbumFromSidebar(${index})"
                     data-album-idx="${index}"
                     class="transition py-1 text-xs block cursor-pointer tracking-tight whitespace-nowrap overflow-hidden text-ellipsis border-l-2 pl-2 shrink-0 ${
                    isCurrentAlbum 
                        ? 'text-[#1db954] font-bold border-[#1db954]' 
                        : 'text-gray-400 hover:text-white border-transparent'
                }" title="${safeAlbum}">
                    • ${safeAlbum}
                </div>
                `;
            }).join('');
        }

        function pressTrackRow(albumIdx, trackIdx) {
            isShuffleActive = false;
            if (currentAlbumIdx === albumIdx && currentTrackIdx === trackIdx) {
                togglePlay();
            } else {
                playTrack(albumIdx, trackIdx);
            }
        }

        function playTrack(albumIdx, trackIdx) {
            setupVisualizer();
            currentAlbumIdx = albumIdx;
            currentTrackIdx = trackIdx;

            const album = musicData[albumIdx];
            const track = album.tracks[trackIdx];

            audioPlayer.src = track.file;
            audioPlayer.play()
                .then(() => updatePlaybackUI(true))
                .catch(e => console.log("Playback error:", e));

            // Para el título inferior quitamos la extensión estéticamente
            const cleanTitle = track.title.replace(/\.[^/.]+$/, "");
            document.getElementById('current-title').innerText = cleanTitle;
            document.getElementById('current-album').innerText = album.album;
            
            const currentCover = document.getElementById('current-cover');
            const placeholder = document.getElementById('placeholder-cover');
            
            if (album.cover && album.cover !== "/music/default.jpg") {
                currentCover.src = album.cover;
                currentCover.classList.remove('hidden');
                placeholder.classList.add('hidden');
            } else {
                currentCover.classList.add('hidden');
                placeholder.classList.remove('hidden');
            }

            const albumView = document.getElementById('album-view');
            if (albumView.classList.contains('hidden') || currentAlbumIdx !== albumIdx) {
                showAlbum(albumIdx);
            } else {
                refreshTracksList(albumIdx);
            }
        }

        function showAlbum(index) {
            const album = musicData[index];

            document.getElementById('main-view').classList.add('hidden');
            document.getElementById('album-view').classList.remove('hidden');

            lastAlbumIndex = index;
            document.querySelector('main').scrollTop = 0;

            document.getElementById('view-title').innerHTML = `
                <div class="flex items-center gap-3">
                    <span>${escapeHTML(album.album)}</span>
                    <div class="flex items-center gap-2 flex-shrink-0">
                        <button onclick="playAlbumShuffle(${index})" 
                                class="w-10 h-10 bg-gray-800 text-gray-300 hover:text-[#1db954] rounded-full flex items-center justify-center hover:scale-105 active:scale-95 transition text-black shadow-xl cursor-pointer">
                            <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M14.83 13.41L13.42 14.83l3.43 3.43H14v2h6v-6h-2v2.83l-3.17-3.17M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.33 2.33-4.17 4.17 1.42 1.41 4.17-4.17L20.6 10H21V4h-6.5zm-5.33 9.42l-1.42-1.41L4 16.59V19h2.41l3.17-3.17z"/></svg>
                        </button>
                        <button onclick="isShuffleActive=false; playAlbumFirstTrack(${index})" 
                                class="w-10 h-10 bg-[#1db954] rounded-full flex items-center justify-center hover:scale-105 active:scale-95 transition text-black shadow-xl cursor-pointer">
                            <svg class="w-7 h-7 fill-current ml-1" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        </button>
                    </div>
                </div>
            `;

            document.getElementById('view-cover').src = album.cover;
            document.getElementById('view-count').innerText = `${album.tracks.length} tracks`;

            refreshTracksList(index);
        }

        function hideAlbum() {
            document.getElementById('album-view').classList.add('hidden');
            document.getElementById('main-view').classList.remove('hidden');
        }

        function togglePlay() {
            if (audioPlayer.src === "" && musicData.length > 0) {
                if (lastAlbumIndex !== -1 && musicData[lastAlbumIndex].tracks.length > 0) {
                    playTrack(lastAlbumIndex, 0);
                } else {
                    playAll();
                }
                return;
            }
            if (audioPlayer.paused) {
                audioPlayer.play().then(() => updatePlaybackUI(true));
            } else {
                audioPlayer.pause();
                updatePlaybackUI(false);
            }
        }

        function playAlbumShuffle(albumIdx) {
            const album = musicData[albumIdx];
            if (!album || album.tracks.length === 0) return;

            currentAlbumIdx = albumIdx;
            isShuffleActive = true;

            // Barajamos los índices usando Fisher-Yates
            shuffleQueue = Array.from({ length: album.tracks.length }, (_, i) => i);
            for (let i = shuffleQueue.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffleQueue[i], shuffleQueue[j]] = [shuffleQueue[j], shuffleQueue[i]];
            }

            shufflePointer = 0;
            playTrack(albumIdx, shuffleQueue[shufflePointer]);
        }

        function updatePlaybackUI(isPlaying) {
            if (isPlaying) {
                playIcon.classList.add('hidden');
                pauseIcon.classList.remove('hidden');
            } else {
                playIcon.classList.remove('hidden');
                pauseIcon.classList.add('hidden');
            }
            
            renderSidebar();
            
            if (currentAlbumIdx !== -1) {
                const currentTrack = musicData[currentAlbumIdx].tracks[currentTrackIdx];
                updateTabTitle(currentTrack.title, isPlaying);
                
                const albumView = document.getElementById('album-view');
                if (!albumView.classList.contains('hidden')) {
                    refreshTracksList(currentAlbumIdx);
                }
            } else {
                updateTabTitle("", false);
            }
        }

        function playNext() {
            if (currentAlbumIdx === -1 || currentTrackIdx === -1) return;

            // Si el shuffle está activo, consume la cola barajada sin repetir
            if (isShuffleActive && shuffleQueue.length > 0) {
                shufflePointer++;
                if (shufflePointer >= shuffleQueue.length) {
                    playAlbumShuffle(currentAlbumIdx); // Si termina el disco, vuelve a barajarlo
                    return;
                }
                playTrack(currentAlbumIdx, shuffleQueue[shufflePointer]);
                return;
            }

            if (currentAlbumIdx === -1 || currentTrackIdx === -1) return;
            let nextTrackIdx = currentTrackIdx + 1;
            let nextAlbumIdx = currentAlbumIdx;

            if (nextTrackIdx < musicData[currentAlbumIdx].tracks.length) {
                playTrack(nextAlbumIdx, nextTrackIdx);
            } else {
                nextAlbumIdx = currentAlbumIdx + 1;
                if (nextAlbumIdx >= musicData.length) nextAlbumIdx = 0;
                if (musicData[nextAlbumIdx].tracks.length > 0) playTrack(nextAlbumIdx, 0);
            }
        }

        function playPrevious() {
            if (currentAlbumIdx === -1 || currentTrackIdx === -1) return;
            let prevTrackIdx = currentTrackIdx - 1;

            if (prevTrackIdx >= 0) {
                playTrack(currentAlbumIdx, prevTrackIdx);
            } else {
                let prevAlbumIdx = currentAlbumIdx - 1;
                if (prevAlbumIdx < 0) prevAlbumIdx = musicData.length - 1;
                
                let lastTrackIdx = musicData[prevAlbumIdx].tracks.length - 1;
                if (lastTrackIdx >= 0) playTrack(prevAlbumIdx, lastTrackIdx);
            }
        }

        function playAlbumFirstTrack(index) {
            if (musicData[index] && musicData[index].tracks.length > 0) {
                playTrack(index, 0);
            }
        }

        function playAll() {
            if (musicData.length > 0 && musicData[0].tracks.length > 0) {
                // Forzamos la apertura visual del primer álbum antes de reproducir
                showAlbum(0);
                
                // Dejamos 50ms para que el navegador pinte la cabecera y luego arrancamos el audio
                setTimeout(() => {
                    playTrack(0, 0);
                }, 50);
            }
        }

        audioPlayer.addEventListener('ended', () => {
            playNext();
        });

        audioPlayer.addEventListener('timeupdate', () => {
            if (isNaN(audioPlayer.duration)) return;
            const pct = (audioPlayer.currentTime / audioPlayer.duration) * 100;
            progressBar.style.width = `${pct}%`;
            timeCurrent.innerText = formatTime(audioPlayer.currentTime);
        });

        audioPlayer.addEventListener('loadedmetadata', () => {
            timeTotal.innerText = formatTime(audioPlayer.duration);
        });

        function formatTime(secs) {
            if (isNaN(secs)) return "0:00";
            const m = Math.floor(secs / 60);
            const s = Math.floor(secs % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function seekTrack(event) {
            if (audioPlayer.src === "") return;
            const rect = progressContainer.getBoundingClientRect();
            const clickX = event.clientX - rect.left;
            const pct = clickX / rect.width;
            audioPlayer.currentTime = pct * audioPlayer.duration;
        }

        async function setupVisualizer() {
            canvas = document.getElementById('vu-meter');
            if (!canvas || canvas.offsetParent === null) return; 

            if (audioContext) {
               if (audioContext.state === 'suspended') {
                   await audioContext.resume();
               }
            return;
            }

            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            await audioContext.resume();

            analyser = audioContext.createAnalyser();
            analyser.fftSize = 64; 
            
            // --- COMPRESOR/NORMALIZADOR ORIGINAL ---
            const compressor = audioContext.createDynamicsCompressor();
            compressor.threshold.setValueAtTime(-24, audioContext.currentTime);
            compressor.knee.setValueAtTime(30, audioContext.currentTime);
            compressor.ratio.setValueAtTime(12, audioContext.currentTime);
            compressor.attack.setValueAtTime(0.003, audioContext.currentTime);
            compressor.release.setValueAtTime(0.25, audioContext.currentTime);

            source = audioContext.createMediaElementSource(audioPlayer);
            
            source.connect(compressor);
            compressor.connect(analyser);
            analyser.connect(audioContext.destination);

            dataArray = new Uint8Array(analyser.frequencyBinCount);
            ctx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth;
            canvas.height = 32;

            drawVisualizer();
        }

        function drawVisualizer() {
            if (!analyser || document.getElementById('vu-meter').offsetParent === null) return;
            requestAnimationFrame(drawVisualizer);

            analyser.getByteFrequencyData(dataArray);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const barWidth = (canvas.width / 8) - 2;
            let x = 0;

            for (let i = 0; i < 8; i++) {
                let value = dataArray[i * 2] || 0; 
                let barHeight = (value / 255) * canvas.height;

                let grad = ctx.createLinearGradient(0, canvas.height, 0, 0);
                grad.addColorStop(0, '#1db954');
                grad.addColorStop(0.7, '#b9b41d');
                grad.addColorStop(1, '#e91e63');

                ctx.fillStyle = grad;
                ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);

                x += barWidth + 2;
            }
        }

        // Detecta cuando la ventana cambia de tamaño para reactivar el VU-meter si vuelve a ser visible
        window.addEventListener('resize', () => {
            const canvas = document.getElementById('vu-meter');
            // Si el canvas es visible, tenemos el analizador listo y el contexto activo, relanzamos el bucle
            if (canvas && canvas.offsetParent !== null && analyser) {
                // Para evitar duplicar bucles si ya se estaba ejecutando por algún motivo
                if (audioPlayer && !audioPlayer.paused) {
                    drawVisualizer();
                }
            }
        });

        window.onload = init;

    </script>

</body>
